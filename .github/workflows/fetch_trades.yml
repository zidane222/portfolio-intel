Fetch trades
YML 
name: Fetch Congress Trades
on:
  schedule:
    - cron: '0 6 * * *'  # runs daily at 6am UTC
  workflow_dispatch:       # allows manual trigger
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Fetch trades from Capitol Trades
        run: |
          curl -s "https://bff.capitoltrades.com/trades?pageSize=200&chamber=house&sortBy=-txDate" \
            -H "User-Agent: Mozilla/5.0" -o house_raw.json
          curl -s "https://bff.capitoltrades.com/trades?pageSize=200&chamber=senate&sortBy=-txDate" \
            -H "User-Agent: Mozilla/5.0" -o senate_raw.json
      - name: Process and combine trades
        run: |
          python3 << 'PYEOF'
          import json, datetime
          def parse(path, source):
              try:
                  with open(path) as f:
                      data = json.load(f)
                  trades = []
                  for t in (data.get('data') or []):
                      ticker = (t.get('ticker') or t.get('asset', {}).get('ticker') or '').upper().replace('--','')
                      if not ticker or len(ticker) > 6:
                          continue
                      trades.append({
                          'date': t.get('txDate') or t.get('reportedDate', ''),
                          'representative': t.get('politician', {}).get('name', ''),
                          'ticker': ticker,
                          'type': t.get('txType', ''),
                          'amount': str(t.get('txValue', '')),
                          'description': t.get('asset', {}).get('assetName', ticker),
                          'source': source
                      })
                  return trades
              except Exception as e:
                  print(f'Error parsing {path}: {e}')
                  return []
          house = parse('house_raw.json', 'house')
          senate = parse('senate_raw.json', 'senate')
          all_trades = house + senate
          all_trades.sort(key=lambda x: x.get('date',''), reverse=True)
          output = {
              'trades': all_trades[:200],
              'house_count': len(house),
              'senate_count': len(senate),
              'updated': datetime.datetime.utcnow().isoformat()
          }
          with open('trades.json', 'w') as f:
              json.dump(output, f)
          print(f"Saved {len(all_trades)} trades")
          PYEOF
      - name: Commit trades.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add trades.json
          git diff --staged --quiet || git commit -m "Auto-update trades $(date -u '+%Y-%m-%d')"
          git push \

