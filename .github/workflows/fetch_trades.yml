Now I understand the problem — this JS bundle is for the Lobbying Disclosure site, not Financial Disclosures. They're two different apps on the same domain. The financial disclosure (stock trading) search is on a completely different part of the site.

The financial disclosure PTR data is actually published as downloadable files. Let me try the direct download approach:


